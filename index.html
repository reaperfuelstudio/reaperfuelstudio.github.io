<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaper Fuel Studio</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: #eee;
    }

    .container {
        max-width: 900px;
        margin: auto;
        padding: 40px 20px;
    }

    .profile {
        text-align: center;
        margin-bottom: 50px;
    }

    .profile img {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #444;
    }

    h1 {
        margin-top: 20px;
        font-size: 2.2rem;
    }

    p {
        line-height: 1.6;
        color: #ccc;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        margin-top: 30px;
    }

    .gallery img {
        width: 100%;
        border-radius: 10px;
        display: block;
    }

    .footer {
        margin-top: 50px;
        text-align: center;
        color: #777;
        font-size: 0.9rem;
    }
</style>
</head>

<body>

<div class="container">

    <div class="profile">
        <img src="icon.png" alt="Studio Logo">

        <h1>Reaper Fuel Studio</h1>

        <p>
            Reaper Fuel Studio is an independent game development studio focused on immersive
            simulation and multiplayer experiences. We create atmospheric interactive worlds,
            gameplay systems, and experimental mechanics using Unity.
        </p>
    </div>

    <div class="gallery">
        <img src="gallery1.png" alt="Screenshot 1">
        <img src="gallery2.png" alt="Screenshot 2">
        <img src="gallery3.png" alt="Screenshot 3">
    </div>

    <div class="footer">
        Contact: ReaperFuelStudio@gmail.com
    </div>

</div>

</body>
</html>
